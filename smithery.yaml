startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - PIXOO_IP
    properties:
      PIXOO_IP:
        type: string
        description: "IP address of the Pixoo device on the local network."
      PIXOO_SIZE:
        type: integer
        enum: [16, 32, 64]
        default: 64
        description: "Display resolution (16, 32, or 64)."
      MCP_LOG_LEVEL:
        type: string
        default: 'info'
        description: 'Minimum logging level.'
  commandFunction: |
    (config) => ({
      "command": "bunx",
      "args": ["pixoo-mcp-server"],
      "env": {
        "PIXOO_IP": config.PIXOO_IP,
        "PIXOO_SIZE": String(config.PIXOO_SIZE),
        "MCP_TRANSPORT_TYPE": "stdio",
        "MCP_LOG_LEVEL": config.MCP_LOG_LEVEL
      }
    })
